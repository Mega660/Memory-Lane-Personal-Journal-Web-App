<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegTek Personal Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1> MegTek Memory Lane</h1>

    <div class="entry-form">
      <input type="text" id="entryTitle" placeholder="Title">
      <input type="date" id="entryDate">
      <textarea id="entryContent" placeholder="Write your memory..."></textarea>
      <button id="addEntryBtn">Add Entry</button>
    </div>

    <div id="entriesContainer" class="entries-container">

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
